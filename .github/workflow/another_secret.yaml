   ```yaml
   name: Test GitHub Secrets

   on:
     push:
       branches:
         - main

   jobs:
     print-secrets:
       runs-on: ubuntu-latest

       steps:
         - name: Echo both secrets
           run: |
             echo "::add-mask::${{ secrets.ANOTHER_SECRET }}"
             echo "My ANOTHER_SECRET is: ${{ secrets.ANOTHER_SECRET }}"
   ```
